<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Love Calculator</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff4b6e;
            --glass: rgba(255, 255, 255, 0.15);
            --glass-border: rgba(255, 255, 255, 0.2);
        }

        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            overflow: hidden;
            background: linear-gradient(45deg, #1a1a2e, #16213e, #ff4b6e, #1a1a2e);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            font-family: 'Outfit', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            /* Removes blue tap box on mobile */
        }

        @keyframes gradientBG {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        /* The Glass Card */
        .card {
            background: var(--glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px 30px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            z-index: 10;
            position: relative;
        }

        h1 {
            font-size: 2.5rem;
            margin: 0 0 10px 0;
            font-weight: 800;
            background: -webkit-linear-gradient(#fff, #ffd1d1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            color: rgba(255, 255, 255, 0.8);
            font-size: 1.1rem;
            margin-bottom: 30px;
        }

        /* The Counter Area */
        .stat-box {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 40px;
        }

        .count-label {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.7;
            margin-bottom: 5px;
        }

        #counter {
            font-size: 3rem;
            font-weight: 600;
            line-height: 1;
            font-variant-numeric: tabular-nums;
            text-shadow: 0 0 20px rgba(255, 75, 110, 0.6);
        }

        /* Buttons */
        .btn-wrapper {
            display: flex;
            flex-direction: column;
            gap: 15px;
            position: relative;
            min-height: 150px;
            /* Keeps layout stable */
        }

        button {
            padding: 16px 0;
            width: 100%;
            border-radius: 12px;
            border: none;
            font-size: 1.1rem;
            font-weight: 600;
            font-family: 'Outfit', sans-serif;
            cursor: pointer;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            outline: none;
        }

        button:active {
            transform: scale(0.95);
        }

        /* The Correct Button */
        #truthBtn {
            background: white;
            color: #ff4b6e;
            box-shadow: 0 4px 15px rgba(255, 255, 255, 0.2);
        }

        /* The Lie Button (The Runner) */
        #lieBtn {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        /* Background Particles */
        .particle {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.3;
            pointer-events: none;
        }

        /* Winner Modal */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            backdrop-filter: blur(5px);
        }

        .overlay h2 {
            font-size: 3rem;
            color: #ff4b6e;
            margin-bottom: 10px;
        }

        .overlay p {
            font-size: 1.5rem;
        }
    </style>
</head>

<body>

    <div class="card">
        <h1>Love Stats</h1>
        <p>Calculating who loves who more...</p>

        <div class="stat-box">
            <div class="count-label">My Love for You</div>
            <div id="counter">0</div>
        </div>

        <div class="btn-wrapper">
            <button id="truthBtn">You love me more</button>
            <button id="lieBtn">I love you more</button>
        </div>
    </div>

    <div class="overlay" id="overlay">
        <h2>CORRECT!</h2>
        <p>Good girl Lou. I knew you'd admit it eventually.</p>
        <p>❤️</p>
    </div>

    <script>
        // --- 1. The Infinite Counter ---
        const counter = document.getElementById('counter');
        let count = 0;

        setInterval(() => {
            count += Math.floor(Math.random() * 415);
            counter.innerText = count.toLocaleString();
        }, 40);


        // --- 2. The Runaway Logic (Mobile & Desktop) ---
        const lieBtn = document.getElementById('lieBtn');
        const truthBtn = document.getElementById('truthBtn');
        const overlay = document.getElementById('overlay');

        // Helper to move the button
        function moveButton(e) {
            // Prevent the click from triggering
            if (e) e.preventDefault();

            // Get screen dimensions
            const w = window.innerWidth;
            const h = window.innerHeight;

            // Button dimensions
            const btnW = lieBtn.offsetWidth;
            const btnH = lieBtn.offsetHeight;

            // Generate random position, but keep it inside the screen (with 20px padding)
            const newX = Math.random() * (w - btnW - 40) + 20;
            const newY = Math.random() * (h - btnH - 40) + 20;

            lieBtn.style.position = 'fixed';
            lieBtn.style.left = newX + 'px';
            lieBtn.style.top = newY + 'px';
            lieBtn.style.zIndex = '1000'; // Make sure it sits on top of everything
        }

        // Desktop: Run on hover
        lieBtn.addEventListener('mouseover', moveButton);

        // Mobile: Run on touch (and prevent the click)
        lieBtn.addEventListener('touchstart', moveButton, { passive: false });

        // Just in case they are fast clickers on desktop
        lieBtn.addEventListener('click', (e) => {
            e.preventDefault();
            moveButton();
        });


        // --- 3. The Winner Logic (Confetti) ---
        truthBtn.addEventListener('click', () => {
            overlay.style.display = 'flex';
            fireConfetti();
        });


        // --- 4. Simple Canvas Confetti System ---
        function fireConfetti() {
            const canvas = document.createElement('canvas');
            canvas.style.position = 'fixed';
            canvas.style.top = '0';
            canvas.style.left = '0';
            canvas.style.width = '100%';
            canvas.style.height = '100%';
            canvas.style.pointerEvents = 'none';
            canvas.style.zIndex = '999';
            document.body.appendChild(canvas);

            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            const particles = [];
            const colors = ['#ff4b6e', '#ffffff', '#ffb6c1', '#fad0c4'];

            for (let i = 0; i < 150; i++) {
                particles.push({
                    x: canvas.width / 2,
                    y: canvas.height / 2,
                    vx: (Math.random() - 0.5) * 15,
                    vy: (Math.random() - 0.5) * 15,
                    size: Math.random() * 8 + 2,
                    color: colors[Math.floor(Math.random() * colors.length)],
                    life: 100
                });
            }

            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                particles.forEach((p, index) => {
                    p.x += p.vx;
                    p.y += p.vy;
                    p.vy += 0.2; // Gravity
                    p.life--;
                    ctx.fillStyle = p.color;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    ctx.fill();
                    if (p.life <= 0) particles.splice(index, 1);
                });

                if (particles.length > 0) requestAnimationFrame(animate);
                else canvas.remove();
            }
            animate();
        }

        // --- 5. Ambient Background Particles ---
        function createAmbientParticles() {
            const particle = document.createElement('div');
            particle.classList.add('particle');

            const size = Math.random() * 5 + 2;
            particle.style.width = size + 'px';
            particle.style.height = size + 'px';

            particle.style.left = Math.random() * 100 + 'vw';
            particle.style.top = '100vh';

            const duration = Math.random() * 10 + 5;
            particle.style.transition = `top ${duration}s linear, opacity ${duration}s ease`;

            document.body.appendChild(particle);

            // Trigger animation
            setTimeout(() => {
                particle.style.top = '-10vh';
                particle.style.opacity = '0';
            }, 100);

            setTimeout(() => {
                particle.remove();
            }, duration * 1000);
        }
        setInterval(createAmbientParticles, 500);

    </script>
</body>

</html>
